<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deadly Purge SMP Survey - Page 7</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
    h1 { color: #2c7; }
    form { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1); }
    label { display: block; margin: 10px 0 5px; }
    .likert { margin: 10px 0; }
    .likert label { display: inline-block; margin-right: 15px; }
    button { background: #2c7; color: #fff; border: none; padding: 10px 15px; cursor: pointer; }
    button:hover { background: #1a5; }
  </style>
</head>
<body>
  <h1>📋 Deadly Purge SMP Survey</h1>
  <form onsubmit="event.preventDefault(); window.location.href='page8.html';">

    <h2>Section 3: Deadly Purge SMP Gameplay</h2>

    <label>61. I believe purge events should allow custom armor.</label>
    <div class="likert">
      <label><input type="radio" name="q61"> Strongly Agree</label>
      <label><input type="radio" name="q61"> Agree</label>
      <label><input type="radio" name="q61"> Neutral</label>
      <label><input type="radio" name="q61"> Disagree</label>
      <label><input type="radio" name="q61"> Strongly Disagree</label>
    </div>

    <label>62. I believe purge events should limit custom armor.</label>
    <div class="likert">
      <label><input type="radio" name="q62"> Strongly Agree</label>
      <label><input type="radio" name="q62"> Agree</label>
      <label><input type="radio" name="q62"> Neutral</label>
      <label><input type="radio" name="q62"> Disagree</label>
      <label><input type="radio" name="q62"> Strongly Disagree</label>
    </div>

    <label>63. I believe purge events should allow custom mobs.</label>
    <div class="likert">
      <label><input type="radio" name="q63"> Strongly Agree</label>
      <label><input type="radio" name="q63"> Agree</label>
      <label><input type="radio" name="q63"> Neutral</label>
      <label><input type="radio" name="q63"> Disagree</label>
      <label><input type="radio" name="q63"> Strongly Disagree</label>
    </div>

    <h2>Section 4: Gaming Content Preferences</h2>

    <label>64. What is your favorite Minecraft game mode?</label>
    <select>
      <option>Survival</option>
      <option>Creative</option>
      <option>Adventure</option>
      <option>Hardcore</option>
    </select>

    <label>65. Do you prefer SMP or single-player?</label>
    <select><option>SMP</option><option>Single-player</option></select>

    <label>66. Do you prefer PvP or PvE?</label>
    <select><option>PvP</option><option>PvE</option></select>

    <label>67. Do you prefer roleplay or competitive SMP?</label>
    <select><option>Roleplay</option><option>Competitive</option></select>

    <label>68. Do you prefer vanilla or modded SMP?</label>
    <select><option>Vanilla</option><option>Modded</option></select>

    <label>69. Do you prefer plugins or datapacks?</label>
    <select><option>Plugins</option><option>Datapacks</option></select>

    <label>70. Do you prefer economy systems in SMP?</label>
    <select><option>Yes</option><option>No</option></select>

    <button type="submit">Next →</button>
  </form>
</body>
</html>
