<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deadly Purge SMP Survey - Page 10</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
    h1 { color: #2c7; }
    form { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1); }
    label { display: block; margin: 10px 0 5px; }
    input, select { width: 100%; padding: 8px; margin-bottom: 15px; }
    button { background: #2c7; color: #fff; border: none; padding: 10px 15px; cursor: pointer; }
    button:hover { background: #1a5; }
  </style>
</head>
<body>
  <h1>📋 Deadly Purge SMP Survey</h1>
  <form onsubmit="event.preventDefault(); window.location.href='https://panelopenionbd.github.io/Surveys/success';">

    <h2>Section 5: Final Demographics (US & BD)</h2>

    <label>91. Do you prefer SMP with custom structures?</label>
    <select><option>Yes</option><option>No</option></select>

    <label>92. Do you prefer SMP with custom quests?</label>
    <select><option>Yes</option><option>No</option></select>

    <label>93. Do you prefer SMP with custom achievements?</label>
    <select><option>Yes</option><option>No</option></select>

    <label>94. How many people live in your household?</label>
    <input type="number" placeholder="Enter number">

    <label>95. Do you live in an urban or rural area?</label>
    <select><option>Urban</option><option>Rural</option></select>

    <label>96. What language do you speak at home?</label>
    <input type="text" placeholder="Enter language">

    <label>97. How often do you play Minecraft per week?</label>
    <input type="text" placeholder="e.g., 5 times per week">

    <label>98. How often do you watch Minecraft content online?</label>
    <input type="text" placeholder="e.g., daily, weekly">

    <label>99. Do cultural traditions influence your gaming choices?</label>
    <select><option>Yes</option><option>No</option></select>

    <label>100. Would you participate in future SMP surveys?</label>
    <select><option>Yes</option><option>No</option></select>

    <button type="submit">Submit Survey ✅</button>
  </form>
</body>
</html>
